name: Windows installer repro

on:
  push:
    branches:
      - debug/windows-installer-ci
  workflow_dispatch:

jobs:
  powershell51:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect public installer with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $PSVersionTable | Format-List | Out-String

          $uri = "https://wakezilla.dev/install.ps1"
          $response = Invoke-WebRequest -Uri $uri -UseBasicParsing
          "status=$($response.StatusCode)"
          "content_type=$($response.Headers["Content-Type"])"
          "raw_content_length=$($response.RawContentLength)"
          if ($null -eq $response.Content) {
            "iwr_content_is_null=true"
          } else {
            "iwr_content_type=$($response.Content.GetType().FullName)"
            "iwr_content_length=$($response.Content.Length)"
            "iwr_first80=$($response.Content.Substring(0, [Math]::Min(80, $response.Content.Length)))"
          }

          $irm = Invoke-RestMethod -Uri $uri
          if ($null -eq $irm) {
            "irm_is_null=true"
          } else {
            "irm_type=$($irm.GetType().FullName)"
            if ($irm -is [string]) {
              "irm_length=$($irm.Length)"
              "irm_first80=$($irm.Substring(0, [Math]::Min(80, $irm.Length)))"
            } else {
              "irm_count=$($irm.Count)"
              "irm_preview=$($irm | Select-Object -First 5 | Out-String)"
            }
          }

      - name: Reproduce public pipe with Windows PowerShell
        shell: powershell
        env:
          WAKEZILLA_INSTALL_DIR: ${{ runner.temp }}\wakezilla-bin-ps51
          VERSION: "0.2.5"
        run: |
          $ErrorActionPreference = "Stop"
          try {
            irm https://wakezilla.dev/install.ps1 | iex
            "pipe_result=success"
          } catch {
            "pipe_result=failure"
            "exception_type=$($_.Exception.GetType().FullName)"
            "exception_message=$($_.Exception.Message)"
            "script_stack_trace=$($_.ScriptStackTrace)"
            $_ | Format-List * -Force | Out-String
            if ($_.Exception) {
              $_.Exception | Format-List * -Force | Out-String
            }
            throw
          }

      - name: Reproduce local file with Windows PowerShell
        if: always()
        shell: powershell
        env:
          WAKEZILLA_INSTALL_DIR: ${{ runner.temp }}\wakezilla-bin-local-ps51
          VERSION: "0.2.5"
        run: |
          $ErrorActionPreference = "Stop"
          try {
            Get-Content -Raw .\install.ps1 | iex
            "local_pipe_result=success"
          } catch {
            "local_pipe_result=failure"
            "exception_type=$($_.Exception.GetType().FullName)"
            "exception_message=$($_.Exception.Message)"
            "script_stack_trace=$($_.ScriptStackTrace)"
            $_ | Format-List * -Force | Out-String
            if ($_.Exception) {
              $_.Exception | Format-List * -Force | Out-String
            }
            throw
          }
