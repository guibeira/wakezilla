name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: Setup Rust toolchain
        shell: bash
        run: |
          rustup toolchain install nightly --allow-downgrade
          rustup default nightly
          rustup target add wasm32-unknown-unknown

      - name: Add Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . frontend

      - name: Cache Cargo bin directory
        uses: actions/cache@v4
        id: cache-cargo-bin
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-v1
          restore-keys: |
            ${{ runner.os }}-cargo-bin-

      - name: Install Trunk
        if: steps.cache-cargo-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if ! command -v trunk &> /dev/null; then
            cargo install trunk
          fi

      - name: Build frontend
        shell: bash
        run: cd frontend && trunk build --release

      - name: Build binary
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag_version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="wakezilla-${VERSION}-${TARGET}.tar.gz"
          mkdir -p release
          cp target/${TARGET}/release/wakezilla release/wakezilla
          chmod +x release/wakezilla
          tar -C release -czf "release/${ARCHIVE}" wakezilla
          rm -f release/wakezilla

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/wakezilla-${{ steps.tag_version.outputs.version }}-${{ matrix.target }}.tar.gz
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: tag_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"
          if [[ "$VERSION" =~ (rc|alpha|beta|pre) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.tag_version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/SHA256SUMS
          draft: false
          prerelease: ${{ steps.tag_version.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    needs: release
    # Skip the entire job for prereleases before any environment gate fires.
    if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'pre') }}
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: tag_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          MANIFEST_VERSION=$(
            awk '
              /^\[package\]/ { in_pkg = 1; next }
              /^\[/          { in_pkg = 0 }
              in_pkg && /^version[[:space:]]*=/ {
                match($0, /"[^"]*"/)
                print substr($0, RSTART + 1, RLENGTH - 2)
                exit
              }
            ' Cargo.toml
          )
          if [[ "$TAG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match Cargo.toml [package] version '$MANIFEST_VERSION'."
            exit 1
          fi
          echo "Tag and manifest agree on version $TAG_VERSION."

      - name: Setup Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Setup frontend build toolchain
        shell: bash
        run: |
          rustup toolchain install nightly --allow-downgrade
          rustup target add wasm32-unknown-unknown --toolchain nightly
          cargo install trunk --locked
          cargo install wasm-bindgen-cli --locked

      - name: Build packaged frontend assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf frontend-dist
          cd frontend
          trunk build --release --dist ../frontend-dist
          test -f ../frontend-dist/index.html

      - name: Verify frontend assets are packaged
        shell: bash
        run: |
          set -euo pipefail
          cargo package -p wakezilla --list --allow-dirty | grep '^frontend-dist/index.html$'

      - name: Dry-run publish
        shell: bash
        run: cargo publish -p wakezilla --dry-run --no-verify --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish wakezilla to crates.io
        shell: bash
        run: cargo publish -p wakezilla --no-verify --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
